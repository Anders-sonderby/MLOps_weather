name: Daily Weather Forecast Pipeline

on:
  workflow_dispatch:  # Allow manual triggering
  schedule:
    # Every day at 19:00 UTC = 20:00 CET (Danish winter time)
    # Using minutes past the hour to avoid scheduler congestion
    - cron: '7 19 * * *'

permissions:
  contents: write

jobs:
  run-weather-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run weather forecast pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python main.py
      
      - name: Show generated files
        run: |
          echo "=== ROOT ==="
          ls -la
          echo "=== DATA ==="
          ls -la data || true
          echo "=== OUTPUT ==="
          ls -la output || true
          echo "=== POEMS ==="
          ls -la output/poems || true
      
      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p data output/poems docs
          git add data output docs
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update weather data, poem, and GitHub Pages - $(date +'%Y-%m-%d %H:%M')"
            git push
          fi